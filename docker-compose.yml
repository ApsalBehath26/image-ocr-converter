version: '3.9'

services:
  web:
    build: .
    container_name: image-ocr-converter
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.main
      - FLASK_ENV=production
      - UPLOAD_FOLDER=/app/uploads
      - MAX_CONTENT_LENGTH=10485760
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - ocr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: ocr-redis
    ports:
      - "6379:6379"
    networks:
      - ocr-network
    volumes:
      - redis-data:/data
    restart: unless-stopped

networks:
  ocr-network:
    driver: bridge

volumes:
  redis-data:
